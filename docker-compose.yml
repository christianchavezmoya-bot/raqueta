version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: raqueta_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: raqueta_user
      POSTGRES_PASSWORD: raqueta_pass
      POSTGRES_DB: raqueta_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U raqueta_user -d raqueta_db']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: raqueta_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://raqueta_user:raqueta_pass@postgres:5432/raqueta_db
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: raqueta_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  postgres_data:
